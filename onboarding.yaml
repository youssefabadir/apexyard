# =============================================================================
# ApexYard Onboarding Configuration
# =============================================================================
#
# Fill in this file to customize ApexYard for your team.
# Claude Code reads this file to understand your company context.
#
# After editing, commit this file to your repo. Claude Code will use it
# to tailor its behavior to your team's structure and processes.
#

# -----------------------------------------------------------------------------
# ApexYard Setup
# -----------------------------------------------------------------------------
# ApexYard governs a PORTFOLIO of repos as one organisation. The repo this
# file lives in is your "ops repo" — ApexYard itself, forked from
# me2resh/apexyard. A registry file (apexyard.projects.yaml) lists every
# managed project. Skills like /projects, /inbox, /status, /tasks aggregate
# across the registry. Per-project docs live in projects/<name>/, and live
# working copies (optional) live in workspace/<name>/.
#
# See docs/setup.md for the full guide.

# -----------------------------------------------------------------------------
# Company Information
# -----------------------------------------------------------------------------
company:
  name: "ACME"
  mission: ""
  vision: ""
  website: ""

  # Core values that guide decision-making
  values:
    - "Quality over speed"
    - "Ship and learn"
    - "Keep it simple"

  # What kind of software you build
  products:
    - name: "Main Platform"
      description: "REDACTED with REDACTED (REDACTED), serverless AWS backend, and Vue frontend"
      type: "saas"

# -----------------------------------------------------------------------------
# Team Structure
# -----------------------------------------------------------------------------
team:
  - name: "Ahmed"
    role: "head-of-engineering"
    department: "engineering"
    responsibilities:
      - "Platform"
      - "Security"
      - "Architecture"
    title: "REDACTED"

# -----------------------------------------------------------------------------
# Tech Stack
# -----------------------------------------------------------------------------
tech_stack:
  language: "TypeScript"           # Primary language (SAM lambdas + NestJS BFF)
  runtime: "Node.js"
  framework: "Vue"                 # Frontend framework
  backend: "NestJS"                # BFF pattern — ALB + Nginx on 2 Fargate containers
  database: "MySQL"                # Legacy monolith DB
  hosting: "AWS"
  cdn: "Cloudflare"
  ci_cd: "GitHub Actions"
  testing: "Vitest"
  e2e_testing: "Playwright"
  iac: "AWS SAM"                   # Serverless infrastructure

  # Additional services
  ehr: "REDACTED"                 # EHR system
  legacy: "PHP + MySQL monolith"
  bff_pattern: "ALB + Nginx on Fargate (2 containers, NestJS)"

# -----------------------------------------------------------------------------
# Project Management
# -----------------------------------------------------------------------------
project_management:
  tool: "Jira"
  instance: "example.atlassian.net"
  sprint_duration: ""              # Kanban — no fixed sprints
  branching_strategy: "feature-branch"
  ticket_prefix: "PROJ"

# -----------------------------------------------------------------------------
# Quality Standards
# -----------------------------------------------------------------------------
quality:
  test_coverage_target: 80

  required_reviews: 1

  required_checks:
    - lint
    - typecheck
    - test
    - build
    - sam validate --lint

  review_style: "thorough"

# -----------------------------------------------------------------------------
# Workflows
# -----------------------------------------------------------------------------
workflows:
  require_prd: true
  require_technical_design: true
  require_qa_signoff: true
  require_security_review: true    # Ahmed leads security
  require_design_review: true      # Vue frontend
  use_feature_flags: false
  use_agent_decision_records: true

# -----------------------------------------------------------------------------
# Communication
# -----------------------------------------------------------------------------
communication:
  primary: "Slack"
  documentation: "GitHub Wiki"
  design: "Figma"
